server:
  port: 8080

spring:
  application:
    name: skill-db-manage
  datasource:
    url: jdbc:mysql://localhost:3306/skill_db_manage?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: status
      logic-delete-value: 0
      logic-not-delete-value: 1

jwt:
  secret: BhVP3rBk8Bq64TXw7eYzNmL9oR2sF5uAjC0dGfHiJcK
  access-token-expiration: 7200000    # 2小时
  refresh-token-expiration: 604800000 # 7天

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn
